<app-header title="Urgente" icon="alert" color="danger"></app-header>

<ion-content>
  <ng-container *ngIf="urgentProducts().length; else empty">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="6">
          <ion-list>
            <ng-container *ngFor="let product of urgentProducts()">
              <ion-item>
                <ion-label>
                  <h2>{{ product.name }}</h2>
                  <ng-container *ngIf="settingsService.isAdvanced()">
                    <p *ngIf="product.price" class="text-green-600">
                      {{product.price | number:'1.2-2'}} €
                    </p>
                    <p *ngIf="product.notes" class="text-gray-500 text-xs">
                      {{product.notes}}
                    </p>
                  </ng-container>
                </ion-label>
                <ion-checkbox
                  slot="end"
                  [(ngModel)]="product.checked"
                  (ionChange)="handleToggleChange(product.name)"
                >
                </ion-checkbox>
              </ion-item>
            </ng-container>
          </ion-list>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ng-container>
</ion-content>

<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button color="danger" (click)="addProduct()">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>

<ng-template #empty>
  <div class="empty">
    No hay productos urgentes. Añade
    <span
      class="text-red-500 hover:text-red-800 cursor-pointer"
      (click)="addProduct()"
      >aquí</span
    >
    lo que necesites comprar solo una vez.
  </div>
</ng-template>
