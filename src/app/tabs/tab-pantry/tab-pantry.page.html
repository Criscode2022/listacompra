<app-header
  title="Despensa"
  icon="home"
  [deleteButtonInvisible]="false"
></app-header>

<ion-content>
  <!-- Category Filter Bar -->
  <div class="filter-bar" *ngIf="products().length && !dataService.basicMode()">
    <div class="filter-scroll">
      <button
        class="filter-chip"
        [class.active]="selectedFilter() === 'all'"
        (click)="setFilter('all')"
      >
        <ion-icon name="grid-outline"></ion-icon>
        <span>Todo</span>
        <span class="filter-count">{{ categoryCounts()['all'] }}</span>
      </button>
      <ng-container *ngFor="let cat of categories">
        <button
          *ngIf="categoryCounts()[cat.value] > 0"
          class="filter-chip"
          [class.active]="selectedFilter() === cat.value"
          [style.--chip-color]="cat.color"
          (click)="setFilter(cat.value)"
        >
          <ion-icon
            [name]="isAssetIcon(cat.icon) ? undefined : cat.icon"
            [src]="isAssetIcon(cat.icon) ? cat.icon : undefined"
          ></ion-icon>
          <span>{{ cat.label }}</span>
          <span class="filter-count">{{ categoryCounts()[cat.value] }}</span>
        </button>
      </ng-container>
    </div>
  </div>

  <!-- Product List -->
  <ng-container *ngIf="pantryProducts().length; else empty">
    <ion-list lines="inset" class="product-list">
      <ng-container *ngFor="let product of pantryProducts()">
        <ion-item-sliding [disabled]="isDesktop()">
          <ion-item
            button
            (click)="dataService.toggleStatus(product.name)"
            class="product-item"
          >
            <div
              *ngIf="!dataService.basicMode()"
              class="category-dot"
              slot="start"
              [style.background]="getCategoryColor(product.category)"
            ></div>
            <ion-label class="product-label">
              <h3 class="product-name">{{ product.name }}</h3>
              <p class="product-meta">
                <ion-icon
                  *ngIf="!dataService.basicMode()"
                  [name]="getCategoryIconName(product.category)"
                  [src]="getCategoryIconSrc(product.category)"
                  class="meta-icon"
                ></ion-icon>
                {{ product.unit !== 'ud' ? product.unit : '' }}
              </p>
            </ion-label>
            <button
              *ngIf="isDesktop()"
              slot="end"
              type="button"
              class="desktop-delete-button"
              [class.quantity-hidden]="product.checked"
              title="Doble click para eliminar"
              aria-label="Doble click para eliminar"
              (dblclick)="deleteProduct(product.name, $event)"
              appStopPropagation
            >
              <ion-icon name="close"></ion-icon>
            </button>
            <span
              *ngIf="!product.checked"
              slot="end"
              class="quantity-badge"
              (click)="editQuantity(product.name, product.quantity)"
              appStopPropagation
            >
              {{ product.quantity }}{{ product.unit !== 'ud' ? product.unit :
              'x' }}
            </span>
            <ion-toggle
              slot="end"
              [checked]="product.checked"
              (ionChange)="dataService.toggleStatus(product.name)"
              appStopPropagation
            >
            </ion-toggle>
          </ion-item>
          <ion-item-options side="end" *ngIf="!isDesktop()">
            <ion-item-option
              color="danger"
              (click)="dataService.delete(product.name)"
            >
              Borrar
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      </ng-container>
    </ion-list>
  </ng-container>
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addProduct()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>

<ng-template #empty>
  <div class="empty">
    No hay productos en tu despensa. Añade
    <span
      class="text-blue-500 hover:text-blue-800 cursor-pointer"
      (click)="addProduct()"
      >aquí</span
    >
    tus productos habituales para añadirlos a la lista cuando necesites
    comprarlos.
  </div>
</ng-template>
